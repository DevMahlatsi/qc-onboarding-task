<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Welcome</title>
  <link href="style.css" rel="stylesheet">
</head>
<body>
  <div class="index-home">
    <nav>
      
      <h1>
        Query Crest
      </h1>
    </nav>
    <div>
      <form id="loginForm" class="form-login">
        <div  class="form">
          <div class="form-heading">
            <h2>Welcome back</h2>
            <p>Sign in to view your applications.</p>
          </div>
          <div class="user-details">
            <div class="user-details-input">
              <label class="label-in-form" for="userEmail">Email address </label>
            <input class="input-field-in-form" type="email" name="userEmail" id="userEmail" placeholder="you@example.com">
            </div>
            <div class="user-details-input">
              <label class="label-in-form" for="userPassword">Password</label>
               <input class="input-field-in-form" type="password" name="userPassword" id="userPassword" placeholder="••••••••••">
            </div>
            
            
          </div>
          <div>
            <button class="submit-button" type="submit">Sign in</button>
          </div>
          <div class="bottom-text">
            <p>
              <span class="change-auth-method">Don't have an account? </span>
              <a class="register-login toggle-auth" id="toggleAuth">Register</a>
            </p>
          </div>
        </div>
      </form>  
      <form onsubmit="handleSubmit" id="registerForm" class="form-register" hidden>
        <div class="form">
          <div class="form-heading">
              <h2>Welcome aboard</h2>
              <p>Enter your details below to create an account</p>
          </div>
          <div class="user-details">
            <div class="user-details-input">
              <label for="userFirstNameRegister" class="label-in-form">
                First Name
              </label>
              <input class="input-field-in-form" type="text" name="userFirstName" id="userFirstNameRegister" placeholder="John">
            </div>
          
            <div class="user-details-input">
              <label for="userLastNameRegister" class="label-in-form">
                Last Name
              </label>
              <input class="input-field-in-form" type="email" name="userLastName" id="userLastNameRegister" placeholder="Maputla">
            </div>

            <div class="user-details-input">
              <label for="userPhoneNumberRegister" class="label-in-form">
                Phone Number
              </label>
              <input class="input-field-in-form" type="email" name="userPhoneNumber" id="userPhoneNumberRegister" placeholder="0611148128" maxlength="10">
            </div>
          
          <div class="user-details-input">
              <label for="userEmailRegister" class="label-in-form">
                Email address
              </label>
              <input class="input-field-in-form" type="email" name="userEmail" id="userEmailRegister" placeholder="you@example.com">
          </div>
          
          <div class="user-details-input">
            <label class="label-in-form" for="userPasswordRegister">Password</label>
            <input class="input-field-in-form" type="password" name="userPassword" id="userPasswordRegister" minlength="8"placeholder="••••••••••">
          </div>
          
        </div>
        <div>
            <button class="submit-button" type="submit">Register</button>
          </div>
          <div class="bottom-text">
            <p>
              <span class="change-auth-method">Already have an account?</span>
              <a class="register-login toggle-auth" id="toggleAuth">Sign in</a>
            </p>
          </div>
        
        <!-- </div> -->
      </form>
        
      
    </div>
  </div>
  
</body>
<script>
  let isSignigIn = false;

  const toggleButtons = document.querySelectorAll(".toggle-auth");
  const registerForm = document.getElementById('registerForm');
  const loginForm = document.getElementById('loginForm');


  const handleRegister =(event) =>{
    event.preventDefault();
  }
  const handleLogin = (event) =>{
    event.preventDefault();
  }
  registerForm.addEventListener('submit', handleRegister);
  loginForm.addEventListener('submit', handleLogin);


  
  
  

  const handleAuth = () =>{
    isSignigIn = !isSignigIn;

    if (isSignigIn){
      // isSigninigIn=false;
      loginForm.hidden = false;
      registerForm.hidden = true
    }
    else{
      // isSigninigIn=true;
      loginForm.hidden = true;
      registerForm.hidden= false;
    }
  }
  
  

  toggleButtons.forEach(button => {
    button.addEventListener("click", handleAuth);
});



</script>
</html>
